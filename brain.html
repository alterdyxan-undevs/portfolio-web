        <style type="text/css">

             #mynetwork {
                 width: 100%;

                 border: 1px solid lightgray;

    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([ {"color": "#ff69b4", "font": {"color": "white"}, "id": "Kurumi", "label": "Kurumi", "shape": "dot", "size": 25, "title": "AI Assistant"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "OpenCV", "label": "OpenCV", "shape": "dot", "size": 10, "title": "Computer Vision"},
                                            {"color": "#87cefa", "font": {"color": "white"}, "id": "Dimas", "label": "Dimas", "shape": "dot", "size": 50, "title": "Creator"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "YouTube", "label": "YouTube", "shape": "dot", "size": 10, "title": "Platform Video"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "Voice", "label": "Voice", "shape": "dot", "size": 10, "title": "Voice Module"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "Tiktok", "label": "Tiktok", "shape": "dot", "size": 10, "title": "Platform Video"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "Threevrm", "label": "Threevrm", "shape": "dot", "size": 10, "title": "Tubuh Virtual /avatar"},
                                            {"color": "green", "font": {"color": "white"}, "id": "Brain", "label": "Brain", "shape": "dot", "size": 10, "title": "Otak utama"},
                                            {"color": "orange", "font": {"color": "white"}, "id": "Memory", "label": "Memory", "shape": "dot", "size": 10, "title": "Memory"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "Websocket", "label": "Websocket", "shape": "dot", "size": 10, "title": "Bridge"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "stm", "label": "Short Term Memory", "shape": "dot", "size": 10, "title": "Memory"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "ltm", "label": "Long Term Memory", "shape": "dot", "size": 10, "title": "Memory"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "input-router", "label": "Input Router", "shape": "dot", "size": 10, "title": "Input Router"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "output-router", "label": "Output Router", "shape": "dot", "size": 10, "title": "Output Router"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "tts", "label": "TTS", "shape": "dot", "size": 10, "title": "TextToSpeech"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "stt", "label": "STT", "shape": "dot", "size": 10, "title": "SpeechToText"},
                                            {"color": "#ffffff", "font": {"color": "white"}, "id": "vmem", "label": "Vision Memory", "shape": "dot", "size": 10, "title": "Memory"}
                                          ]);
                  edges = new vis.DataSet([ {"from": "Kurumi", "to": "OpenCV"}, 
                                            {"from": "Kurumi", "to": "Dimas"}, 
                                            {"from": "Dimas", "to": "Kurumi"}, 
                                            {"from": "Kurumi", "to": "YouTube"},
                                            {"from": "Kurumi", "to": "Voice"},
                                            {"from": "Kurumi", "to": "Tiktok"},
                                            {"from": "Kurumi", "to": "Threevrm"},
                                            {"from": "Brain", "to": "Memory"},
                                            {"from": "Websocket", "to": "input-router"},
                                            {"from": "Websocket", "to": "output-router"},
                                            {"from": "Brain", "to": "input-router"},
                                            {"from": "Brain", "to": "output-router"},
                                            {"from": "Memory", "to": "input-router"},
                                            {"from": "Memory", "to": "output-router"},
                                            {"from": "Memory", "to": "Threevrm"},
                                            {"from": "Memory", "to": "YouTube"},
                                            {"from": "Memory", "to": "Tiktok"},
                                            {"from": "Memory", "to": "Kurumi"},
                                            {"from": "Threevrm", "to": "Kurumi"},
                                            {"from": "Brain", "to": "OpenCV"},
                                            {"from": "Brain", "to": "Kurumi"},
                                            {"from": "Brain", "to": "Threevrm"},
                                            {"from": "OpenCV", "to": "Brain"},
                                            {"from": "Brain", "to": "Memory"},
                                            {"from": "Websocket", "to": "Threevrm"},
                                            {"from": "Websocket", "to": "Brain"},
                                            {"from": "Memory", "to": "stm"},
                                            {"from": "Memory", "to": "ltm"},
                                            {"from": "Memory", "to": "vmem"},
                                            {"from": "YouTube", "to": "Memory"},
                                            {"from": "Tiktok", "to": "Memory"},
                                            {"from": "OpenCV", "to": "Memory"},
                                            {"from": "Kurumi", "to": "Brain"},
                                            {"from": "Voice", "to": "Brain"},
                                            {"from": "Voice", "to": "stt"},
                                            {"from": "Voice", "to": "tts"},
                                            {"from": "Voice", "to": "Memory"},
                                            {"from": "tts", "to": "Kurumi"},
                                            {"from": "Kurumi", "to": "Memory"}
                                          ]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"barnesHut": {"gravitationalConstant": -18000, "springLength": 120, "springConstant": 0.01, "damping": 0.09}, "minVelocity": 0.75}, "nodes": {"font": {"size": 14}}, "interaction": {"hover": true, "tooltipDelay": 100}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
